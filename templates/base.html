{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}Dice & Dragons{% endblock %}</title>

	<link rel="icon" href="{% static 'media/favicon.ico' %}" type="image/x-icon">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
	<link href="{% static 'dnd_fantasy.css' %}" rel="stylesheet">
</head>
<body>

	{% include "components/header.html" %}

	<main class="container mt-4 mb-5">
		{% if messages %}
			<div class="mb-3">
				{% for message in messages %}
					<div class="alert alert-{{ message.tags }} alert-dismissible" role="alert">
						{{ message }}
						<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрити"></button>
					</div>
				{% endfor %}
			</div>
		{% endif %}
		{% block content %}
		{% endblock %}
	</main>

	{% include "components/footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

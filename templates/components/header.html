{% load static %}
<header class="fantasy-header">
    <div class="fantasy-header-bg"></div>
    <div class="container">
        <div class="fantasy-header-content">
            <a href="{% url 'products:home' %}" class="fantasy-logo">
                <img src="{% static 'media/logo.jpeg' %}" alt="Logo" class="fantasy-logo-img">
                <h1 class="fantasy-title-header">Dice & Dragons</h1>
            </a>
            <button class="fantasy-burger" id="navToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <nav class="fantasy-nav-row" id="mainNav">
                <ul class="fantasy-nav-list">
                    <li>
                        <a href="{% url 'products:categories_list' %}" class="fantasy-nav-link {% if request.resolver_match.url_name == 'categories_list' or request.resolver_match.url_name == 'category' %}active{% endif %}">Гільдії</a>
                    </li>
                    <li>
                        <a href="{% url 'products:product_list' %}" class="fantasy-nav-link {% if request.resolver_match.url_name == 'product_list' or request.resolver_match.url_name == 'product_details' %}active{% endif %}">Каталог</a>
                    </li>
                    {% if request.user.is_authenticated %}
                        <li>
                            <a href="{% url 'account:profile' %}" class="fantasy-nav-link fantasy-account-btn {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">Профіль</a>
                        </li>
                        <li>
                            <a href="{% url 'account:logout' %}" class="fantasy-nav-link fantasy-account-btn">Вийти</a>
                        </li>
                    {% else %}
                        <li>
                            <a href="{% url 'account:login' %}" class="fantasy-nav-link fantasy-account-btn {% if request.resolver_match.url_name == 'login' %}active{% endif %}">Вхід</a>
                        </li>
                        <li>
                            <a href="{% url 'account:register' %}" class="fantasy-nav-link fantasy-account-btn {% if request.resolver_match.url_name == 'register' %}active{% endif %}">Реєстрація</a>
                        </li>
                    {% endif %}
                    <li class="fantasy-nav-search">
                        <form action="{% url 'products:search' %}" method="get" class="fantasy-search-form">
                            <input type="text" name="q" placeholder="Пошук..." class="fantasy-search-input">
                            <button type="submit" class="fantasy-search-btn">🔍</button>
                        </form>
                    </li>
                    <li>
                        <a href="{% url 'cart:cart_details' %}" class="fantasy-nav-link fantasy-cart-link">
                            🛒 Кошик
                           <span class="fantasy-cart-count">{{ cart_item_count }}</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</header>
<script>
document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('mainNav').classList.toggle('open');
    this.classList.toggle('open');
});
</script>
